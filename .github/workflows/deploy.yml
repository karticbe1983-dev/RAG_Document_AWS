name: Deploy RAG Agent

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, prod]
      force_reindex:
        description: "Force re-indexing of all documents"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.7.5"
  PYTHON_VERSION: "3.11"

jobs:
  # ── 1. Lint & test ────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Type check
        run: mypy src/

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  # ── 2. Terraform plan ─────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exit_code }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=rag-document-aws/${{ github.event.inputs.environment || 'dev' }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        id: plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="environment=${{ github.event.inputs.environment || 'dev' }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -out=tfplan \
            -detailed-exitcode 2>&1 | tee plan.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 7

  # ── 3. Terraform apply ────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main'
    environment: ${{ github.event.inputs.environment || 'dev' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python deps for local-exec provisioner
        run: pip install boto3 opensearch-py requests-aws4auth

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=rag-document-aws/${{ github.event.inputs.environment || 'dev' }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform outputs
        working-directory: terraform
        id: tf_outputs
        run: |
          echo "documents_bucket=$(terraform output -raw documents_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "knowledge_base_id=$(terraform output -raw knowledge_base_id)" >> "$GITHUB_OUTPUT"
          echo "data_source_id=$(terraform output -raw data_source_id)" >> "$GITHUB_OUTPUT"
          echo "agent_id=$(terraform output -raw agent_id)" >> "$GITHUB_OUTPUT"
          echo "opensearch_endpoint=$(terraform output -raw opensearch_collection_endpoint)" >> "$GITHUB_OUTPUT"

    outputs:
      documents_bucket: ${{ steps.tf_outputs.outputs.documents_bucket }}
      knowledge_base_id: ${{ steps.tf_outputs.outputs.knowledge_base_id }}
      data_source_id: ${{ steps.tf_outputs.outputs.data_source_id }}
      agent_id: ${{ steps.tf_outputs.outputs.agent_id }}
      opensearch_endpoint: ${{ steps.tf_outputs.outputs.opensearch_endpoint }}

  # ── 4. Sync documents to S3 ───────────────────────────────────────────────
  sync-documents:
    name: Sync Documents to S3
    runs-on: ubuntu-latest
    needs: terraform-apply
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync docs/ to S3
        run: |
          aws s3 sync docs/ \
            s3://${{ needs.terraform-apply.outputs.documents_bucket }}/docs/ \
            --delete \
            --exclude "*" \
            --include "*.md" \
            --include "*.pdf" \
            --include "*.txt" \
            --include "*.docx" \
            --include "*.csv" \
            --only-show-errors

      - name: Report uploaded files
        run: |
          echo "Documents in S3:"
          aws s3 ls s3://${{ needs.terraform-apply.outputs.documents_bucket }}/docs/ --recursive

  # ── 5. Trigger Bedrock Knowledge Base ingestion ───────────────────────────
  ingest-knowledge-base:
    name: Ingest Knowledge Base
    runs-on: ubuntu-latest
    needs: [terraform-apply, sync-documents]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install boto3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start ingestion job
        run: |
          python scripts/trigger_ingestion.py \
            --knowledge-base-id ${{ needs.terraform-apply.outputs.knowledge_base_id }} \
            --data-source-id ${{ needs.terraform-apply.outputs.data_source_id }} \
            --region ${{ env.AWS_REGION }}

  # ── 6. Deploy / update Bedrock Agent ─────────────────────────────────────
  deploy-agent:
    name: Deploy Bedrock Agent
    runs-on: ubuntu-latest
    needs: [terraform-apply, ingest-knowledge-base]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare and publish agent alias
        run: |
          python scripts/deploy_agent.py \
            --agent-id ${{ needs.terraform-apply.outputs.agent_id }} \
            --knowledge-base-id ${{ needs.terraform-apply.outputs.knowledge_base_id }} \
            --region ${{ env.AWS_REGION }} \
            --alias-name ${{ github.event.inputs.environment || 'dev' }}

      - name: Smoke test agent
        run: |
          python scripts/smoke_test.py \
            --agent-id ${{ needs.terraform-apply.outputs.agent_id }} \
            --region ${{ env.AWS_REGION }}
